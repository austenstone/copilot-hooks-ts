name: Release

# Publishes to npm when a GitHub Release is published. Requires either an
# NPM_TOKEN secret or a configured npm trusted publisher. `id-token: write`
# enables build provenance attestation on the published package.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        # caching intentionally disabled on the publish job (no `cache:` key)
        # zizmor: ignore[cache-poisoning]
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
